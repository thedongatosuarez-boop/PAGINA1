<h1 style="text-align:center;"><b><i>Taller de soldadura Nicolas</i></b></h1>
<h2 id="servicio">Servicio</h2>
<p style="text-align: justify;">
El <b>Taller de Soldadura</b> se especializa en la <i>fabricación, reparación y mantenimiento</i> de estructuras 
metálicas, ofreciendo soluciones prácticas y resistentes para diferentes necesidades. Entre los servicios que se 
realizan se encuentran la elaboración de puertas, ventanas, rejas, portones, protecciones, barandales y estructuras
personalizadas.
</p>

<p style="text-align: justify;">
Además, se brinda atención directa al cliente para diseñar trabajos a medida, tomando en cuenta el espacio disponible, el uso que se le dará y el presupuesto. Esto permite ofrecer un servicio más completo y adaptado a cada persona.
</p>

<p style="text-align: justify;">
El objetivo principal es garantizar productos <u>duraderos, seguros y de buena calidad</u>, utilizando materiales resistentes y técnicas adecuadas.
</p>

<img src="../4 A/img/logo nicolas.jpg" width="300">

<h2 id="marca">Marca y posicionamiento</h2>
<p style="text-align: justify;">
El taller busca posicionarse como un negocio <b>confiable dentro de la comunidad</b>, destacando por su responsabilidad, honestidad y cumplimiento en cada trabajo realizado. Se pretende que los clientes identifiquen al taller como una opción segura.
</p>

<p style="text-align: justify;">
La marca transmite valores como <i>confianza, calidad y compromiso</i>, logrando que las personas recomienden el servicio.
</p>

<h2 id="publico">Público meta</h2>
<p style="text-align: justify;">
El público al que va dirigido este servicio incluye a familias, propietarios de viviendas, pequeños negocios y cualquier persona que requiera trabajos en metal. Principalmente se enfoca en habitantes de la comunidad de Tres Valles y zonas cercanas, quienes buscan mejorar la seguridad de sus hogares o negocios mediante la instalación de estructuras resistentes. También puede atender proyectos más específicos según la necesidad del cliente..
</p>

<p style="text-align: justify;">

</p>

<h2 id="competencia">Competencia</h2>
<p style="text-align: justify;">
En la localidad existen otros talleres que ofrecen servicios similares, lo que genera competencia en el mercado. Sin embargo, este taller se diferencia por su trato directo con el cliente, la calidad de los materiales utilizados y la responsabilidad en la entrega de los trabajos. Además, se busca ofrecer precios accesibles sin descuidar la calidad, lo cual representa una ventaja frente a otros negocios..
</p>

<p style="text-align: justify;">
Además, se busca ofrecer precios accesibles sin descuidar la calidad.
</p>

<h2 id="presupuesto">Presupuesto</h2>
<p style="text-align: justify;">
El costo de los servicios depende del tipo de trabajo solicitado, los materiales requeridos y el tamaño del proyecto. Se realizan cotizaciones previas para que el cliente conozca el precio antes de iniciar el trabajo. El objetivo es mantener un equilibrio entre calidad y precio, ofreciendo opciones accesibles para la mayoría de la población sin reducir la durabilidad de los productos.
</p>

<p style="text-align: justify;">
El objetivo es mantener un equilibrio entre calidad y precio.
</p>

</p>
